<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>AI Quiz Bot</title>
</head>
<body>

<div class="container">

    <h1>EduQuiz</h1>

    <form method="POST">

        <label>Topic</label>
        <input type="text" name="topic" required>

        <label>Difficulty</label>

        <select name="difficulty">
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
        </select>


<label>Number of Questions</label>

<input
    type="number"
    name="question_count"
    min="5"
    max="30"
    step="5"
    value="5"
    required
>

        <button type="submit">
            Generate Quiz
        </button>

    </form>

</div>

</body>
</html>
